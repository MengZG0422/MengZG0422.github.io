<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京时间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0a09;
    color: #d4cfc8;
    font-family: "Noto Serif SC", "Cormorant Garamond", serif;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  main {
    text-align: center;
    animation: in 1.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  .time {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: clamp(5rem, 14vw, 10rem);
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .time .colon {
    color: #c9a96e;
    opacity: 0.5;
    animation: breathe 2s ease-in-out infinite;
  }
  .time .colon:last-child { animation-delay: 1s; }

  .time .sec {
    font-size: 0.42em;
    color: #6b6560;
    vertical-align: 0.5em;
    letter-spacing: 0.03em;
  }

  .date {
    margin-top: 24px;
    font-size: 1rem;
    color: #6b6560;
    letter-spacing: 0.15em;
    font-weight: 300;
  }

  .date span {
    color: #c9a96e;
    font-weight: 400;
  }

  .line {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, #6b6560, transparent);
    margin: 36px auto 0;
    opacity: 0.4;
  }

  .zone {
    margin-top: 32px;
    font-size: 0.75rem;
    color: #6b6560;
    letter-spacing: 0.2em;
    opacity: 0.5;
    font-weight: 300;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.7; }
  }

  @keyframes in {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<main>
  <div class="time" id="time">
    <span id="h">00</span><span class="colon">:</span><span id="m">00</span><span class="colon">:</span><span class="sec" id="s">00</span>
  </div>
  <div class="date" id="d"></div>
  <div class="line"></div>
  <div class="zone">BEIJING · UTC+8</div>
</main>

<script>
const wk = ['周日','周一','周二','周三','周四','周五','周六'];
const p = n => String(n).padStart(2,'0');

function tick() {
  const bj = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
  document.getElementById('h').textContent = p(bj.getHours());
  document.getElementById('m').textContent = p(bj.getMinutes());
  document.getElementById('s').textContent = p(bj.getSeconds());
  document.getElementById('d').innerHTML =
    `${bj.getFullYear()}年${bj.getMonth()+1}月${bj.getDate()}日 &nbsp;<span>${wk[bj.getDay()]}</span>`;
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
